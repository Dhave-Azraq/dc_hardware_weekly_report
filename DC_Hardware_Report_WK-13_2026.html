// Convert [Source Name] tags in news text to hyperlinks
function linkNews(text) {
  let html = esc(text);
  // Match [Source Name] patterns and replace with linked versions
  html = html.replace(/\[([^\]]+)\]/g, function(match, name) {
    const url = NEWS_LINKS[name];
    if (url) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="news-src" title="Source: ${name}">[${name}]</a>`;
    }
    return `<strong style="color:#002147">[${name}]</strong>`;
  });
  return html;
}

    {v:"4+ yrs",l:"Grid wait time",c:"#EA580C",u:"https://www.jll.com/en-us/insights/market-outlook/data-center-outlook",s:"JLL"},
    {v:"2.6%",l:"NA colo vacancy",c:"#10B981",u:"https://landvalues.acres.com/8-u.s.-data-center-trends-for-2026",s:"Acres/CBRE"},
    {v:"$4B",l:"Equinix-atNorth",c:"#DB2777",u:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-march-2026",s:"DC Knowledge"},
    {v:"376 MW+",l:"UAE live capacity",c:"#117ACA",u:"https://www.datacenterknowledge.com/build-design/uae-data-centers-powering-the-middle-east-s-ai-and-cloud-revolution",s:"DC Knowledge"}
  ];
  const wa=[["GTC 2026 follow-on: partner ecosystem + developer tooling","Compute","This week"],["Hyperscaler Q1 previews; $650B CapEx confirmation","Investment","Early Apr"],["DRAM spot pricing , stabilization or Q2 escalation","Supply Chain","Ongoing"],["Data Center World (D.C.) agenda + speakers","Events","Apr 20,23"],["DCD>Connect MENA 2026 , Groq, MSFT, Oracle","Events","Apr 20"]];
  el.innerHTML = `<div class="summary">GTC 2026 reshaped the DC hardware landscape with NVIDIA's $1T+ order pipeline, Vera Rubin shipments, and Groq 3 LPU debut. DRAM prices surged 95% as data centers absorb 70% of global memory. Construction costs climbed to $11.3M/MW, grid delays exceed 4 years, and the Equinix-atNorth $4B deal headlined M&amp;A activity. In the Middle East, UAE surpassed 376 MW live capacity and Saudi Arabia's HUMAIN advanced as a multi-GW sovereign platform.</div>
  <div class="stats-grid">${stats.map(s=>`<div class="stat" style="--sc:${s.c}"><div class="stat-v"><a href="${s.u}" target="_blank" rel="noopener noreferrer" title="Source: ${esc(s.s)}">${s.v}</a></div><div class="stat-l">${s.l} · <a href="${s.u}" target="_blank" rel="noopener noreferrer">${esc(s.s)} ↗</a></div></div>`).join('')}</div>
  <div class="section-label">WEEK AHEAD</div>
  <div class="tbl-wrap"><table class="wa-table"><thead><tr style="border-bottom:1px solid #E5E7EB"><th>#</th><th>Item</th><th>Category</th><th>Timing</th></tr></thead><tbody>${wa.map((r,i)=>`<tr><td class="wa-idx">${String(i+1).padStart(2,'0')}</td><td class="wa-item">${esc(r[0])}</td><td>${catBadge(r[1])}</td><td class="wa-time">${r[2]}</td></tr>`).join('')}</tbody></table></div>`;
}

// ===== HARDWARE TAB =====
function renderHardware(){
  const el=document.getElementById('tab-hardware');
  const cats = hwCat==='all' ? HARDWARE_CATEGORIES : HARDWARE_CATEGORIES.filter(c=>c.category===hwCat);
  const filters = [{k:'all',l:`All (${totalHW})`},...HARDWARE_CATEGORIES.map(c=>({k:c.category,l:`${c.category.split(' ')[0]} (${c.items.length})`}))];
  el.innerHTML = `<div class="filter-bar"><span class="filter-label">FILTER</span>${filters.map(f=>`<button class="fbtn${hwCat===f.k?' active':''}" data-hw="${esc(f.k)}">${esc(f.l)}</button>`).join('')}</div>` +
    cats.map(cat=>`<div style="margin-bottom:26px"><div class="cat-hdr">${cat.category.toUpperCase()} , ${cat.items.length} ITEMS</div><div class="tbl-wrap"><table class="hw-table"><thead><tr style="border-bottom:1px solid #E5E7EB"><th>Vendor</th><th>Model</th><th>Type</th><th>Status</th><th>Power</th><th>Cooling</th><th>Price</th><th>Notes</th><th class="news-th">Critical News / Standards / Policy</th></tr></thead><tbody>${cat.items.map(it=>`<tr style="vertical-align:top"><td class="vendor-cell">${esc(it.vendor)}</td><td class="model-cell">${esc(it.model)}</td><td class="type-cell">${esc(it.type)}</td><td>${statusBadge(it.status)}</td><td class="mono-cell">${esc(it.power)}</td><td class="cool-cell">${esc(it.cooling)}</td><td class="mono-cell">${esc(it.price)}</td><td class="note-cell">${esc(it.note)}</td><td class="news-cell">${linkNews(it.news)}</td></tr>`).join('')}</tbody></table></div></div>`).join('');
  el.querySelectorAll('.fbtn').forEach(btn=>btn.onclick=()=>{hwCat=btn.dataset.hw;renderHardware();});
}

// ===== REGIONS TAB =====
function renderRegions(){
  const el=document.getElementById('tab-regions');
  const r=REGIONS[regIdx];
  el.innerHTML = `<div style="display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap">${REGIONS.map((rg,i)=>`<button class="rbtn${regIdx===i?' active':''}" data-ri="${i}">${rg.flag} ${esc(rg.region)}</button>`).join('')}</div>
  <div class="reg-cards"><div class="reg-card" style="--rc:#117ACA"><div class="reg-card-label">MARKET SIZE</div><div class="reg-card-value"><a href="${r.sizeUrl}" target="_blank" rel="noopener noreferrer" style="color:var(--rc);text-decoration:none">${esc(r.size)}</a></div></div><div class="reg-card" style="--rc:#EA580C"><div class="reg-card-label">KEY METRIC</div><div class="reg-card-value"><a href="${r.metricUrl}" target="_blank" rel="noopener noreferrer" style="color:var(--rc);text-decoration:none">${esc(r.metric)}</a></div></div></div>
  <div class="section-label">TOP 10 , ${r.region.toUpperCase()}</div>
  <div class="tbl-wrap"><table class="reg-table"><thead><tr style="border-bottom:1px solid #E5E7EB"><th>#</th><th>Headline</th><th>Impact</th><th>Category</th></tr></thead><tbody>${r.items.map(it=>{const ic=IC_MAP[it.impact];return`<tr><td class="rank-cell">${it.rank}</td><td class="hl-cell"><a href="${it.url}" target="_blank" rel="noopener noreferrer" style="color:#1E3A5F;text-decoration:none;transition:color .2s" onmouseover="this.style.color='#117ACA'" onmouseout="this.style.color='#1E3A5F'">${esc(it.headline)}</a></td><td>${badge(it.impact.toUpperCase(),ic)}</td><td>${catBadge(it.cat)}</td></tr>`;}).join('')}</tbody></table></div>`;
  el.querySelectorAll('.rbtn').forEach(btn=>btn.onclick=()=>{regIdx=parseInt(btn.dataset.ri);renderRegions();});
}

// ===== MARKET TAB =====
function renderMarket(){
  const el=document.getElementById('tab-market');
  el.innerHTML = `<div class="section-label">MARKET DATA , ${MARKET_STATS.length} DATAPOINTS</div>
  <div class="tbl-wrap"><table class="mkt-table"><thead><tr style="border-bottom:1px solid #E5E7EB"><th>#</th><th>Metric</th><th>Value</th><th>Context</th><th>Source</th></tr></thead><tbody>${MARKET_STATS.map((x,i)=>`<tr><td class="idx-cell">${String(i+1).padStart(2,'0')}</td><td class="metric-cell">${esc(x.label)}</td><td class="val-cell">${esc(x.value)}</td><td class="ctx-cell">${esc(x.delta)}</td><td class="src-cell"><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer" class="src-link">${esc(x.source)} ↗</a></td></tr>`).join('')}</tbody></table></div>
  <div class="sources-box"><div class="sources-title">ALL SOURCES , CLICK TO VERIFY</div><div class="src-badges">${ALL_SOURCES.map(s=>`<a href="${s.u}" target="_blank" rel="noopener noreferrer" class="src-badge">${s.n} ↗</a>`).join('')}</div></div>`;
}

renderOverview();renderHardware();renderRegions();renderMarket();
</script>
